<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="min-h-screen flex flex-col" style="background-color: #ff0404;">
    <header class="flex items-center justify-center mt-20 h-70 flex-col gap-7">
        <h1 class="text-white text-6xl mt-4">Criar Conta</h1>
        <div class="redesSociais flex gap-3">
            <img src="img/facebook-icon.png" alt="">
            <img src="img/google-icon.png" alt="">
            <img src="img/linkind-icon.png" alt="">
        </div>
        <p class="text-white flex text-1xl ">Ou cadastre o seu e-mail</p>
    </header>
    <main class="items-center justify-center flex h-70 flex-col">
            <div class="items-center w-full max-w-lg p-4 flex flex-col gap-5">
                <input 
                    type="Nome"
                    placeholder="Nome"
                    class="w-full px-4 py-2 border border-gray-300 focus:ring-2 focus:border-blue-500 outline-none transition-all"
                    style="background-color: white;"
                />
                <input 
                    type="email"
                    placeholder="Email"
                    class="w-full px-4 py-2 border border-gray-300 focus:ring-2 focus:border-blue-500 outline-none transition-all"
                    style="background-color: white;"
                />
                <input 
                    type="Senha"
                    placeholder="Senha"
                    class="w-full px-4 py-2 border border-gray-300 focus:ring-2 focus:border-blue-500 outline-none transition-all"
                    style="background-color: white;"
                />
            </div>
    </main>
    <footer class="items-center justify-center flex p-4 h-70 flex-col">
        <button type="submit" class="w-48 text-white border-2 border-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 active:scale-95 transition-transform duration-150 shadow-md">
            Cadastrar
        </button>
        <p class="text-sm text-white mt-4 text-center">
            Já possui uma conta? 
            <a href="#" class="font-bold text-white hover:underline hover:text-blue-700 transition-colors">
              Login
            </a>
          </p>
    </footer> 
</body>
</html>
